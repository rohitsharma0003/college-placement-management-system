version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: placehub-db
    restart: always
    environment:
      MYSQL_DATABASE: placehub_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: placehub_user
      MYSQL_PASSWORD: placehub_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: placehub-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://mysql:3306/placehub_db
      - DB_USERNAME=placehub_user
      - DB_PASSWORD=placehub_password
      - JWT_SECRET=docker-secret-key-change-me-in-production-docker-secret-key
      - APP_SEED_DATA=true
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: placehub-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
